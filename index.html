<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>
<header class="top-nav">
  <a href="index.html">Calendrier</a>
  <a href="data.html">Data</a>
  <a href="graphiques.html">Graphiques</a>
</header>
<div class="calendar">

  <!-- NAV -->
  <div class="nav">
    <button id="prev">←</button>

    <div id="weekLabel"></div>

    <button id="next">→</button>

    <button id="openModal">+ Créer</button>
    <button id="refresh">↻ Refresh</button>
  </div>

  <!-- HEADER (⚠️ colonne vide HEURE obligatoire) -->
  <div class="header">
    <div class="hour-header"></div>
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div>
  </div>

  <!-- GRID -->
  <div class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3>Créer un événement</h3>

    <label>Nom</label>
    <input id="eventName" type="text">

    <label>Date début</label>
    <input id="eventStartDate" type="date">

    <label>Heure début</label>
    <input id="eventStartHour" type="number" step="0.25">

    <label>Date fin (optionnel)</label>
    <input id="eventEndDate" type="date">

    <label>Heure fin (optionnel)</label>
    <input id="eventEndHour" type="number" step="0.25">

    <label>Type</label>
    <select id="eventType">
      <option value="sport">Sport</option>
      <option value="evenement">Evenement</option>
    </select>

    <div class="modal-actions">
      <button id="closeModal">Annuler</button>
      <button id="saveEvent">Créer</button>
    </div>

  </div>
</div>

<script>

let currentDate = new Date();
let eventsData = JSON.parse(localStorage.getItem("events") || "[]");

const grid = document.querySelector(".grid");
const weekLabel = document.getElementById("weekLabel");
const modal = document.getElementById("modal");

let mondayGlobal = null;

/* =========================
   CALENDAR
========================= */
function updateCalendar() {

  grid.innerHTML = "";

  const day = currentDate.getDay();
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(currentDate);
  monday.setDate(currentDate.getDate() + diff);
  monday.setHours(0,0,0,0);

  mondayGlobal = monday;

  const options = { day: "numeric", month: "short" };
  const names = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

  // HEADER avec colonne HEURE + 7 jours
  const headerDays = document.querySelectorAll(".header div");

  headerDays.forEach((el, i) => {

    if (i === 0) {
      el.innerHTML = "";
      return;
    }

    const d = new Date(monday);
    d.setDate(monday.getDate() + (i - 1));

    el.innerHTML = `${names[i - 1]}<br><span>${d.toLocaleDateString("fr-FR", options)}</span>`;
  });

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  weekLabel.textContent =
    `${monday.toLocaleDateString("fr-FR", options)} - ${sunday.toLocaleDateString("fr-FR", options)}`;

  // GRID (colonne 1 = heures)
  for (let h = 0; h < 24; h++) {

    const hourCell = document.createElement("div");
    hourCell.className = "hour";
    hourCell.textContent = `${h.toString().padStart(2,"0")}:00`;
    grid.appendChild(hourCell);

    for (let d = 0; d < 7; d++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      grid.appendChild(cell);
    }
  }

  requestAnimationFrame(() => {
    grid.scrollTop = 32 * 12;
  });

  loadEvents();
}

/* =========================
   LOAD EVENTS (TIMESTAMP)
========================= */
function loadEvents() {

  const pxPerMinute = 32 / 60;

  eventsData.forEach(ev => {

    const start = new Date(ev.start);
    const end = new Date(ev.end);

    const diffDays = Math.floor(
      (start - mondayGlobal) / (1000 * 60 * 60 * 24)
    );

    if (diffDays < 0 || diffDays > 6) return;

    const hour = start.getHours();
    const minutes = start.getMinutes();

    const cellIndex = hour * 8 + (diffDays + 1);
    const cell = grid.children[cellIndex];

    if (!cell) return;

    const div = document.createElement("div");
    div.className = `event ${ev.type}`;

    div.style.top = (minutes * pxPerMinute) + "px";
    div.style.height = ((end - start) / 60000) * pxPerMinute + "px";

    div.textContent = ev.nom;

    cell.appendChild(div);
  });
}

/* =========================
   NAV
========================= */
document.getElementById("prev").onclick = () => {
  currentDate.setDate(currentDate.getDate() - 7);
  updateCalendar();
};

document.getElementById("next").onclick = () => {
  currentDate.setDate(currentDate.getDate() + 7);
  updateCalendar();
};

/* =========================
   MODAL
========================= */
document.getElementById("openModal").onclick = () => {
  modal.classList.remove("hidden");
};

document.getElementById("closeModal").onclick = () => {
  modal.classList.add("hidden");
};

/* =========================
   REFRESH
========================= */
document.getElementById("refresh").onclick = () => {
  updateCalendar();
};

/* =========================
   SAVE EVENT (AUTO END)
========================= */
document.getElementById("saveEvent").onclick = () => {

  const name = document.getElementById("eventName").value;

  const startDate = document.getElementById("eventStartDate").value;
  const startHour = parseFloat(document.getElementById("eventStartHour").value);

  let endDate = document.getElementById("eventEndDate").value;
  let endHour = parseFloat(document.getElementById("eventEndHour").value);

  const type = document.getElementById("eventType").value;

  if (!name || !startDate || isNaN(startHour)) {
    alert("Champs obligatoires manquants");
    return;
  }

  // START
  const start = new Date(startDate);
  start.setHours(Math.floor(startHour));
  start.setMinutes((startHour % 1) * 60);

  // AUTO END
  if (!endDate) endDate = startDate;
  if (isNaN(endHour)) endHour = startHour + 1;

  const end = new Date(endDate);
  end.setHours(Math.floor(endHour));
  end.setMinutes((endHour % 1) * 60);

  const newEvent = {
    id: crypto.randomUUID(),
    nom: name,
    start: start.getTime(),
    end: end.getTime(),
    type
  };

  eventsData.push(newEvent);
  localStorage.setItem("events", JSON.stringify(eventsData));

  modal.classList.add("hidden");
  updateCalendar();
};

updateCalendar();

</script>

</body>
</html>
