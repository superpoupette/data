<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>

<div class="calendar">

  <!-- NAV -->
  <div class="nav">
    <button id="prev">←</button>

    <div id="weekLabel"></div>

    <button id="next">→</button>

    <button id="openModal">+ Créer</button>
    <button id="refresh">↻ Refresh</button>
  </div>

  <!-- HEADER -->
<div class="header">
  <div class="hour-header"></div> <!-- IMPORTANT -->
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>

  <!-- GRID -->
  <div class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3>Créer un événement</h3>

    <label>Nom</label>
    <input id="eventName" type="text">

    <label>Date</label>
    <input id="eventDate" type="date">

    <label>Heure (ex: 14.5)</label>
    <input id="eventHour" type="number" step="0.25">

    <label>Durée (minutes)</label>
    <input id="eventDuration" type="number">

    <label>Type</label>
    <select id="eventType">
      <option value="sport">Sport</option>
      <option value="evenement">Evenement</option>
    </select>

    <div class="modal-actions">
      <button id="closeModal">Annuler</button>
      <button id="saveEvent">Créer</button>
    </div>

  </div>
</div>

<script>

let currentDate = new Date();
let eventsData = JSON.parse(localStorage.getItem("events") || "[]");

const grid = document.querySelector(".grid");
const weekLabel = document.getElementById("weekLabel");
const modal = document.getElementById("modal");

let mondayGlobal = null;

/* =========================
   CALENDAR
========================= */
function updateCalendar() {

  grid.innerHTML = "";

  const day = currentDate.getDay();
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(currentDate);
  monday.setDate(currentDate.getDate() + diff);
  monday.setHours(0,0,0,0);

  mondayGlobal = monday;

  const options = { day: "numeric", month: "short" };
  const names = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

  const headerDays = document.querySelectorAll(".header div:not(.hour-header)");

  headerDays.forEach((el, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    el.innerHTML = `${names[i]}<br><span>${d.toLocaleDateString("fr-FR", options)}</span>`;
  });

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  weekLabel.textContent =
    `${monday.toLocaleDateString("fr-FR", options)} - ${sunday.toLocaleDateString("fr-FR", options)}`;

  // GRID
  for (let h = 0; h < 24; h++) {

    const hourCell = document.createElement("div");
    hourCell.className = "hour";
    hourCell.textContent = `${h.toString().padStart(2,"0")}:00`;
    grid.appendChild(hourCell);

    for (let d = 0; d < 7; d++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      grid.appendChild(cell);
    }
  }

  requestAnimationFrame(() => {
    grid.scrollTop = 32 * 12;
  });

  loadEvents();
}

/* =========================
   LOAD EVENTS (ROBUSTE)
========================= */
function loadEvents() {

  const pxPerMinute = 32 / 60;

  eventsData.forEach(ev => {

    let start, end;

    // 🟢 FORMAT TIMESTAMP (nouveau)
    if (ev.start && ev.end) {
      start = new Date(ev.start);
      end = new Date(ev.end);
    }

    // 🟡 FORMAT ANCIEN (compatibilité)
    else if (ev.date && ev.heure != null) {
      start = new Date(ev.date);
      start.setHours(Math.floor(ev.heure));
      start.setMinutes((ev.heure % 1) * 60);

      end = new Date(start.getTime() + (ev.duree || 60) * 60000);
    }

    else return;

    const diffDays = Math.floor(
      (start - mondayGlobal) / (1000 * 60 * 60 * 24)
    );

    if (diffDays < 0 || diffDays > 6) return;

    const hour = start.getHours();
    const minutes = start.getMinutes();

    const cellIndex = hour * 8 + (diffDays + 1);
    const cell = grid.children[cellIndex];

    if (!cell) return;

    const div = document.createElement("div");
    div.className = `event ${ev.type}`;

    div.style.top = (minutes * pxPerMinute) + "px";
    div.style.height = ((end - start) / 60000) * pxPerMinute + "px";

    div.textContent = ev.nom;

    cell.appendChild(div);
  });
}

/* =========================
   NAV
========================= */
document.getElementById("prev").onclick = () => {
  currentDate.setDate(currentDate.getDate() - 7);
  updateCalendar();
};

document.getElementById("next").onclick = () => {
  currentDate.setDate(currentDate.getDate() + 7);
  updateCalendar();
};

/* =========================
   MODAL
========================= */
document.getElementById("openModal").onclick = () => {
  modal.classList.remove("hidden");
};

document.getElementById("closeModal").onclick = () => {
  modal.classList.add("hidden");
};

/* =========================
   REFRESH
========================= */
document.getElementById("refresh").onclick = () => {
  updateCalendar();
};

/* =========================
   SAVE EVENT (TIMESTAMP)
========================= */
document.getElementById("saveEvent").onclick = () => {

  const name = document.getElementById("eventName").value;
  const date = document.getElementById("eventDate").value;
  const hour = parseFloat(document.getElementById("eventHour").value);
  const duration = parseInt(document.getElementById("eventDuration").value);
  const type = document.getElementById("eventType").value;

  if (!name || !date || isNaN(hour) || isNaN(duration)) return;

  const start = new Date(date);
  start.setHours(Math.floor(hour));
  start.setMinutes((hour % 1) * 60);
  start.setSeconds(0);

  const end = new Date(start.getTime() + duration * 60000);

  const newEvent = {
    id: crypto.randomUUID(),
    nom: name,
    start: start.getTime(),
    end: end.getTime(),
    type
  };

  eventsData.push(newEvent);
  localStorage.setItem("events", JSON.stringify(eventsData));

  modal.classList.add("hidden");
  updateCalendar();
};

updateCalendar();

</script>

</body>
</html>
