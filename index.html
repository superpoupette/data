<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Semaine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

  <!-- NAVIGATION -->
  <div class="nav">
    <button id="prev">←</button>
    <div id="weekLabel"></div>
    <button id="next">→</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- GRID -->
  <div class="grid"></div>

</div>

<script>
  let currentDate = new Date();

  const headerDays = document.querySelectorAll(".header div:not(:first-child)");
  const weekLabel = document.getElementById("weekLabel");

  function updateCalendar() {
    const day = currentDate.getDay();
    const diff = (day === 0 ? -6 : 1) - day;

    const monday = new Date(currentDate);
    monday.setDate(currentDate.getDate() + diff);

    const options = { day: "numeric", month: "short" };

    headerDays.forEach((el, index) => {
      const date = new Date(monday);
      date.setDate(monday.getDate() + index);

      const dayName = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"][index];

      el.innerHTML = `${dayName}<br><span>${date.toLocaleDateString("fr-FR", options)}</span>`;
    });

    // Label semaine (ex: 15 avr - 21 avr)
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    weekLabel.textContent =
      `${monday.toLocaleDateString("fr-FR", options)} - ${sunday.toLocaleDateString("fr-FR", options)}`;
  }

  // Navigation
  document.getElementById("prev").addEventListener("click", () => {
    currentDate.setDate(currentDate.getDate() - 7);
    updateCalendar();
  });

  document.getElementById("next").addEventListener("click", () => {
    currentDate.setDate(currentDate.getDate() + 7);
    updateCalendar();
  });

  // GRID HEURES
  const grid = document.querySelector(".grid");

  for (let hour = 0; hour < 24; hour++) {
    const hourCell = document.createElement("div");
    hourCell.classList.add("hour");
    hourCell.textContent = `${hour.toString().padStart(2, "0")}:00`;
    grid.appendChild(hourCell);

    for (let day = 0; day < 7; day++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      grid.appendChild(cell);
    }
  }

  // Auto scroll
  window.addEventListener("load", () => {
    const hourHeight = 60;
    grid.scrollTop = hourHeight * 8;
  });
  <script>
async function loadEvents() {
  const response = await fetch("data.json");
  const events = await response.json();

  events.forEach(event => {
    const eventDate = new Date(event.date);

    addEventToGrid(
      eventDate,
      event.heure,
      event.duree,
      event.type.toLowerCase()
    );
  });
}

loadEvents();
</script>

  updateCalendar();
</script>

</body>
</html>
