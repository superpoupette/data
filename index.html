<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>

<div class="calendar">

  <!-- NAV -->
  <div class="nav">
    <button id="prev">←</button>
    <div id="weekLabel"></div>
    <button id="next">→</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- GRID -->
  <div class="grid"></div>

</div>

<script>
let currentDate = new Date();

const headerDays = document.querySelectorAll(".header div:not(:first-child)");
const grid = document.querySelector(".grid");
const weekLabel = document.getElementById("weekLabel");

function updateCalendar() {

  // reset grid
  grid.innerHTML = "";

  // header dates
  const day = currentDate.getDay();
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(currentDate);
  monday.setDate(currentDate.getDate() + diff);

  const options = { day: "numeric", month: "short" };

  headerDays.forEach((el, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);

    const names = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

    el.innerHTML = `${names[i]}<br><span>${d.toLocaleDateString("fr-FR", options)}</span>`;
  });

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  weekLabel.textContent =
    `${monday.toLocaleDateString("fr-FR", options)} - ${sunday.toLocaleDateString("fr-FR", options)}`;

  // GRID HOURS
  for (let h = 0; h < 24; h++) {
    const hourCell = document.createElement("div");
    hourCell.className = "hour";
    hourCell.textContent = `${h.toString().padStart(2,"0")}:00`;
    grid.appendChild(hourCell);

    for (let d = 0; d < 7; d++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      grid.appendChild(cell);
    }
    // scroll automatique sur midi
setTimeout(() => {
  const hourHeight = 32;
  grid.scrollTop = hourHeight * 12;
}, 0);
  }

  loadEvents(monday);
}

async function loadEvents(monday) {

  const res = await fetch("data.json");
  const events = await res.json();

  events.forEach(ev => {

    const eventDate = new Date(ev.date);

    const diffDays = Math.floor((eventDate - monday) / (1000*60*60*24));
    if (diffDays < 0 || diffDays > 6) return;

    const hour = Math.floor(ev.heure);
    const minutes = (ev.heure % 1) * 60;

    const cellIndex = hour * 8 + (diffDays + 1);
    const cell = grid.children[cellIndex];

    if (!cell) return;

    const div = document.createElement("div");
    div.className = `event ${ev.type}`;

    div.style.top = (minutes / 60 * 60) + "px";
    div.style.height = (ev.duree / 60 * 60) + "px";

    div.textContent = ev.type;

    cell.appendChild(div);
  });
}

// navigation
document.getElementById("prev").onclick = () => {
  currentDate.setDate(currentDate.getDate() - 7);
  updateCalendar();
};

document.getElementById("next").onclick = () => {
  currentDate.setDate(currentDate.getDate() + 7);
  updateCalendar();
};

updateCalendar();
</script>

</body>
</html>
