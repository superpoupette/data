<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Semaine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calendar">
    <div class="header">
      <div>Lundi</div>
      <div>Mardi</div>
      <div>Mercredi</div>
      <div>Jeudi</div>
      <div>Vendredi</div>
      <div>Samedi</div>
      <div>Dimanche</div>
    </div>

    <div class="grid">
      <!-- 24h * 7 jours -->
      <!-- On va générer les cases à la main pour l'instant -->
      <!-- 1 ligne = 1 heure -->
      
      <!-- Exemple ligne 8h -->
      <div class="hour">08:00</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <!-- Tu peux dupliquer pour 09h, 10h, etc -->
    </div>
  </div>
</body>
</html>
