<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>

<div class="calendar">

  <!-- NAV -->
  <div class="nav">
    <button id="prev">←</button>
    <div id="weekLabel"></div>
    <button id="next">→</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- GRID -->
  <div class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3>Créer un événement</h3>

    <label>Nom</label>
    <input id="eventName" type="text">

    <label>Date</label>
    <input id="eventDate" type="date">

    <label>Heure (ex: 14.5)</label>
    <input id="eventHour" type="number" step="0.25">

    <label>Durée (minutes)</label>
    <input id="eventDuration" type="number">

    <label>Type</label>
    <select id="eventType">
      <option value="sport">Sport</option>
      <option value="evenement">Evenement</option>
    </select>

    <div class="modal-actions">
      <button id="closeModal">Annuler</button>
      <button id="saveEvent">Créer</button>
    </div>

  </div>
</div>

<script>

let currentDate = new Date();
let eventsData = JSON.parse(localStorage.getItem("events") || "[]");

const grid = document.querySelector(".grid");
const weekLabel = document.getElementById("weekLabel");
const modal = document.getElementById("modal");

let mondayGlobal = null;

function updateCalendar() {

  grid.innerHTML = "";

  const day = currentDate.getDay();
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(currentDate);
  monday.setDate(currentDate.getDate() + diff);
  mondayGlobal = monday;

  const options = { day: "numeric", month: "short" };
  const names = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

  const headerDays = document.querySelectorAll(".header div:not(:first-child)");

  headerDays.forEach((el, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    el.innerHTML = `${names[i]}<br><span>${d.toLocaleDateString("fr-FR", options)}</span>`;
  });

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  weekLabel.textContent =
    `${monday.toLocaleDateString("fr-FR", options)} - ${sunday.toLocaleDateString("fr-FR", options)}`;

  // GRID (1 heure = 1 ligne)
  for (let h = 0; h < 24; h++) {

    const hourCell = document.createElement("div");
    hourCell.className = "hour";
    hourCell.textContent = `${h.toString().padStart(2,"0")}:00`;
    grid.appendChild(hourCell);

    for (let d = 0; d < 7; d++) {

      const cell = document.createElement("div");
      cell.className = "cell";

      cell.dataset.hour = h;
      cell.dataset.day = d;

      grid.appendChild(cell);
    }
  }

  requestAnimationFrame(() => {
    grid.scrollTop = 32 * 12;
  });

  loadEvents(monday);
}

async function loadEvents(monday) {

  const res = await fetch("data.json");
  const fileEvents = await res.json();

  const events = [...fileEvents, ...eventsData];

  events.forEach(ev => {

    const eventDate = new Date(ev.date);
    const diffDays = Math.floor((eventDate - monday) / (1000*60*60*24));

    if (diffDays < 0 || diffDays > 6) return;

    const hour = Math.floor(ev.heure);
    const minutes = (ev.heure - hour) * 60;

    const cellIndex = hour * 8 + (diffDays + 1);
    const cell = grid.children[cellIndex];

    if (!cell) return;

    const div = document.createElement("div");
    div.className = `event ${ev.type}`;

    const pxPerMinute = 32 / 60;

    div.style.top = (minutes * pxPerMinute) + "px";
    div.style.height = (ev.duree * pxPerMinute) + "px";

    div.innerHTML = `
      <div class="event-content">${ev.nom}</div>
      <div class="resize-handle"></div>
    `;

    cell.appendChild(div);
  });
}

/* NAV */
document.getElementById("prev").onclick = () => {
  currentDate.setDate(currentDate.getDate() - 7);
  updateCalendar();
};

document.getElementById("next").onclick = () => {
  currentDate.setDate(currentDate.getDate() + 7);
  updateCalendar();
};

/* CLICK PRECISE (IMPORTANT FIX) */
grid.addEventListener("click", (e) => {

  const cell = e.target.closest(".cell");
  if (!cell) return;

  const rect = cell.getBoundingClientRect();
  const clickY = e.clientY - rect.top;

  const ratio = clickY / rect.height;

  const hour = parseInt(cell.dataset.hour);
  const minute = Math.round(ratio * 60);

  const day = parseInt(cell.dataset.day);

  const date = new Date(mondayGlobal);
  date.setDate(date.getDate() + day);

  document.getElementById("eventDate").value = date.toISOString().split("T")[0];
  document.getElementById("eventHour").value = hour + minute / 60;

  modal.classList.remove("hidden");
});

/* MODAL */
document.getElementById("closeModal").onclick = () => {
  modal.classList.add("hidden");
};

document.getElementById("saveEvent").onclick = () => {

  const newEvent = {
    nom: document.getElementById("eventName").value,
    date: document.getElementById("eventDate").value,
    heure: parseFloat(document.getElementById("eventHour").value),
    duree: parseInt(document.getElementById("eventDuration").value),
    type: document.getElementById("eventType").value
  };

  eventsData.push(newEvent);
  localStorage.setItem("events", JSON.stringify(eventsData));

  modal.classList.add("hidden");
  updateCalendar();
};

/* RESIZE */
let resizing = null;

document.addEventListener("mousedown", (e) => {
  if (!e.target.classList.contains("resize-handle")) return;

  resizing = {
    el: e.target.parentElement,
    startY: e.clientY,
    startHeight: e.target.parentElement.offsetHeight
  };
});

document.addEventListener("mousemove", (e) => {
  if (!resizing) return;

  const diff = e.clientY - resizing.startY;
  const newHeight = Math.max(20, resizing.startHeight + diff);

  resizing.el.style.height = newHeight + "px";
});

document.addEventListener("mouseup", () => {

  if (!resizing) return;

  const pxPerMinute = 32 / 60;
  const newDuration = Math.round(resizing.el.offsetHeight / pxPerMinute);

  resizing.el.dataset.duration = newDuration;

  resizing = null;
});

updateCalendar();

</script>

</body>
</html>
