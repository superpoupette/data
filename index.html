<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Semaine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calendar">
    <div class="header">
    <div></div> <!-- case vide pour aligner avec les heures -->
    <div>Lundi</div>
    <div>Mardi</div>
    <div>Mercredi</div>
    <div>Jeudi</div>
    <div>Vendredi</div>
    <div>Samedi</div>
    <div>Dimanche</div>
  </div>

    <div class="grid">
      <!-- 24h * 7 jours -->
      <!-- On va générer les cases à la main pour l'instant -->
      <!-- 1 ligne = 1 heure -->
      
      <!-- Exemple ligne 8h -->
      <div class="hour">08:00</div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <!-- Tu peux dupliquer pour 09h, 10h, etc -->
    </div>
  </div>
  <script>
  const headerDays = document.querySelectorAll(".header div:not(:first-child)");

  const today = new Date();

  // Trouver lundi de la semaine
  const day = today.getDay(); // 0 = dimanche
  const diff = (day === 0 ? -6 : 1) - day;

  const monday = new Date(today);
  monday.setDate(today.getDate() + diff);

  const options = { day: "numeric", month: "short" };

  headerDays.forEach((el, index) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + index);

    const dayName = [
      "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"
    ][index];

    el.innerHTML = `${dayName}<br><span>${date.toLocaleDateString("fr-FR", options)}</span>`;
  });
</script>
</body>
</html>
