<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Data</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>

<header class="top-nav">
  <a href="index.html">Calendrier</a>
  <a href="data.html">Data</a>
  <a href="graphiques.html">Graphiques</a>
</header>

<h2 style="margin: 10px;">Liste des événements</h2>

<table id="eventsTable">
  <thead>
    <tr>
      <th>Début</th>
      <th>h</th>
      <th>Fin</th>
      <th>h</th>
      <th>Min</th>
      <th>Nom</th>
      <th>Type</th>
      <th>🗑</th>
    </tr>
  </thead>

  <tbody></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("events") || "[]");

const tbody = document.querySelector("#eventsTable tbody");

function formatDate(d) {
  return new Date(d).toLocaleDateString("fr-FR");
}

function formatHour(d) {
  const date = new Date(d);
  return date.getHours().toString().padStart(2, "0") + ":" +
         date.getMinutes().toString().padStart(2, "0");
}

function renderTable() {

  tbody.innerHTML = "";

  data.forEach((ev, index) => {

    const start = new Date(ev.start);
    const end = new Date(ev.end);
    const duration = Math.round((end - start) / 60000);

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${formatDate(start)}</td>
      <td>${formatHour(start)}</td>
      <td>${formatDate(end)}</td>
      <td>${formatHour(end)}</td>
      <td>${duration}</td>
      <td>${ev.nom}</td>
      <td>${ev.type}</td>
      <td><button class="deleteBtn">✖</button></td>
    `;

    row.querySelector(".deleteBtn").onclick = () => {
      data.splice(index, 1);
      localStorage.setItem("events", JSON.stringify(data));
      renderTable();
    };

    tbody.appendChild(row);
  });
}

renderTable();

</script>

</body>
</html>
